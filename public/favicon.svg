<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fond bleu nuit -->
  <rect width="32" height="32" rx="6" fill="#1e3a8a"/>
  
  <!-- Symbole livre/journal stylisé -->
  <g transform="translate(6, 4)">
    <!-- Page de gauche -->
    <rect x="2" y="2" width="8" height="20" rx="1" fill="#ffffff" opacity="0.9"/>
    <!-- Page de droite -->
    <rect x="10" y="2" width="8" height="20" rx="1" fill="#ffffff" opacity="0.8"/>
    <!-- Ligne de reliure -->
    <rect x="9.5" y="2" width="1" height="20" fill="#60a5fa"/>
    <!-- Lignes de texte -->
    <rect x="4" y="6" width="4" height="0.5" fill="#1e3a8a" opacity="0.6"/>
    <rect x="4" y="8" width="4" height="0.5" fill="#1e3a8a" opacity="0.6"/>
    <rect x="4" y="10" width="3" height="0.5" fill="#1e3a8a" opacity="0.6"/>
    <rect x="12" y="6" width="4" height="0.5" fill="#1e3a8a" opacity="0.5"/>
    <rect x="12" y="8" width="4" height="0.5" fill="#1e3a8a" opacity="0.5"/>
    <rect x="12" y="10" width="3" height="0.5" fill="#1e3a8a" opacity="0.5"/>
  </g>
  
  <!-- Petit écho sonore stylisé -->
  <g transform="translate(22, 20)">
    <circle cx="0" cy="0" r="2" fill="#60a5fa"/>
    <circle cx="3" cy="-1" r="1.5" fill="#60a5fa" opacity="0.7"/>
    <circle cx="5.5" cy="-2" r="1" fill="#60a5fa" opacity="0.5"/>
  </g>
</svg>
